events {
    worker_connections 1024;
}

http {
    # ── Rate Limit 定義 ──────────────────────────────────────────
    # AI 分析：每個 IP 每分鐘最多 10 次
    limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=10r/m;

    # 一般 API：每個 IP 每秒最多 30 次
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # 登入端點：每個 IP 每分鐘最多 5 次（防暴力破解）
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # ── Log 格式 ─────────────────────────────────────────────────
    log_format main '$remote_addr - $request - $status - $body_bytes_sent bytes - ${request_time}s';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── 上游服務 ─────────────────────────────────────────────────
    upstream data_platform {
        server data-platform:8000;
    }

    server {
        listen 9000;
        server_name localhost;

        # ── 安全標頭（全域） ──────────────────────────────────────
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ── /gateway/ai/* — 嚴格限流（AI 分析端點）──────────────
        location /gateway/ai/ {
            limit_req zone=ai_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         http://data_platform/api/ai/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 90s;
        }

        # ── /gateway/auth/login — 登入專用限流 ───────────────────
        location = /gateway/auth/login {
            limit_req zone=login_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         http://data_platform/api/auth/login;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 15s;
        }

        # ── /gateway/auth/register — 註冊限流 ────────────────────
        location = /gateway/auth/register {
            limit_req zone=login_limit burst=2 nodelay;
            limit_req_status 429;

            proxy_pass         http://data_platform/api/auth/register;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 15s;
        }

        # ── /gateway/* — 一般 API 路由 ───────────────────────────
        location /gateway/ {
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass         http://data_platform/api/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ── /health — Gateway 健康檢查 ───────────────────────────
        location /health {
            return 200 '{"gateway":"nginx","status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── 429 錯誤自訂回應 ─────────────────────────────────────
        error_page 429 @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"error":"請求過於頻繁，請稍後再試","retry_after":"60s"}';
        }
    }
}
