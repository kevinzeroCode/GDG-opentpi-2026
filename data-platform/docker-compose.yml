services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stockdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: stockdb1234
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - platform_internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - platform_internal

  data-platform:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
    volumes:
      - ./app:/app/app
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - platform_internal
      - app_default

volumes:
  postgres_data:

networks:
  platform_internal:
    driver: bridge
  app_default:
    external: true
