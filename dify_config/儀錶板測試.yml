    - data:
        code: "import json\nimport math\n\ndef main(arg1: str, **kwargs):\n    raw_input\
          \ = arg1 if arg1 else list(kwargs.values())[0]\n    \n    try:\n        data\
          \ = json.loads(str(raw_input))\n        # 數據中台格式：{\"status\": 200, \"data\"\
          : [{\"date\":..., \"open\":..., \"max\":..., \"min\":..., \"close\":..., \"\
          Trading_Volume\":...}]}\n        candles = data.get('data', [])\n        if\
          \ not candles:\n            return {\"result\": \"數據不足 26 筆\"}\n        prices\
          \ = [c['close'] for c in candles if c.get('close') is not None]\n        highs\
          \ = [c['max'] for c in candles if c.get('max') is not None]\n        lows\
          \ = [c['min'] for c in candles if c.get('min') is not None]\n        \n  \
          \      if len(prices) < 26:\n            return {\"result\": \"數據不足 26 筆\"\
          }\n\n        # --- MA ---\n        ma5 = sum(prices[-5:]) / 5\n        ma20\
          \ = sum(prices[-20:]) / 20\n        \n        # --- RSI ---\n        deltas\
          \ = [prices[i] - prices[i-1] for i in range(1, len(prices))]\n        gains\
          \ = [d if d > 0 else 0 for d in deltas[-14:]]\n        losses = [-d if d\
          \ < 0 else 0 for d in deltas[-14:]]\n        rsi = 100 - (100 / (1 + (sum(gains)/14\
          \ + 1e-9) / (sum(losses)/14 + 1e-9)))\n\n        # --- KD ---\n        lowest_low\
          \ = min(lows[-9:])\n        highest_high = max(highs[-9:])\n        k_value\
          \ = (prices[-1] - lowest_low) / (highest_high - lowest_low + 1e-9) * 100\n\
          \        k_values = []\n        for i in range(3):\n            idx = -(i\
          \ + 1)\n            ll = min(lows[-9+idx:len(lows)+idx]) if len(lows)+idx\
          \ >= 9 else min(lows[:len(lows)+idx])\n            hh = max(highs[-9+idx:len(highs)+idx])\
          \ if len(highs)+idx >= 9 else max(highs[:len(highs)+idx])\n            k_val\
          \ = (prices[idx-1] - ll) / (hh - ll + 1e-9) * 100\n            k_values.append(k_val)\n\
          \        d_value = sum(k_values) / 3\n\n        # --- MACD ---\n        def\
          \ ema(data, period):\n            multiplier = 2 / (period + 1)\n         \
          \   result = [data[0]]\n            for price in data[1:]:\n             \
          \   result.append((price - result[-1]) * multiplier + result[-1])\n      \
          \      return result\n        ema12 = ema(prices, 12)\n        ema26 = ema(prices,\
          \ 26)\n        macd_line = ema12[-1] - ema26[-1]\n        macd_hist_full\
          \ = [e12 - e26 for e12, e26 in zip(ema12[-26:], ema26[-26:])]\n        signal_line\
          \ = ema(macd_hist_full, 9)[-1]\n        histogram = macd_line - signal_line\n\
          \n        trend = '多頭' if ma5 > ma20 else '空頭'\n        return {\n     \
          \       \"result\": f\"當前價: {prices[-1]}, RSI: {round(rsi, 2)}, MA5: {round(ma5,\
          \ 2)}, K值: {round(k_value, 2)}, D值: {round(d_value, 2)}, MACD: {round(macd_line,\
          \ 2)}, Signal: {round(signal_line, 2)}, Histogram: {round(histogram, 2)},\
          \ 趨勢: {trend}\"\n        }\n    except Exception as e:\n        return {\"result\"\
          : f\"計算錯誤: {str(e)}\"}"
