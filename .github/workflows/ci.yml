name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      contains(toJson(github.event.commits.*.modified), 'src/') ||
      contains(toJson(github.event.commits.*.added), 'src/') ||
      contains(toJson(github.event.commits.*.modified), 'index.html') ||
      contains(toJson(github.event.commits.*.added), 'index.html') ||
      contains(toJson(github.event.commits.*.modified), 'vite.config') ||
      contains(toJson(github.event.commits.*.modified), 'package') ||
      contains(toJson(github.event.commits.*.added), 'package') ||
      contains(toJson(github.event.commits.*.modified), 'nginx.conf') ||
      contains(toJson(github.event.commits.*.modified), '.github/workflows/ci.yml')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000
          VITE_GATEWAY_URL: http://localhost:9000/gateway
          VITE_DIGIRUNNER_URL: http://localhost:31080
          VITE_EMAILJS_SERVICE_ID: placeholder
          VITE_EMAILJS_TEMPLATE_ID: placeholder
          VITE_EMAILJS_PUBLIC_KEY: placeholder
          VITE_DIFY_API_URL: https://api.dify.ai/v1
          VITE_DIFY_API_KEY: placeholder
          VITE_FIREBASE_API_KEY: placeholder
          VITE_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: placeholder
          VITE_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          VITE_FIREBASE_APP_ID: '1:000000000000:web:placeholder'

  backend:
    name: Backend (data-platform) Lint & Test
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      contains(toJson(github.event.commits.*.modified), 'data-platform/') ||
      contains(toJson(github.event.commits.*.added), 'data-platform/') ||
      contains(toJson(github.event.commits.*.modified), '.github/workflows/ci.yml')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd data-platform
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          cd data-platform
          python -m py_compile app/main.py
          python -m py_compile app/config.py
          find app -name "*.py" | xargs python -m py_compile
