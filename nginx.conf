server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /dify/ → api.dify.ai，API Key 由伺服器端加入，瀏覽器看不到
    location /dify/ {
        proxy_pass https://api.dify.ai/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.dify.ai;
        proxy_set_header Authorization "Bearer ${DIFY_API_KEY}";
        proxy_set_header Content-Type application/json;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin $http_origin always;
    }

    # Proxy /twse & /finmind → digirunner
    location /twse/ {
        proxy_pass http://digirunnner:18080/twse/;
        proxy_set_header Host $host;
    }

    location /finmind/ {
        proxy_pass http://digirunnner:18080/finmind/;
        proxy_set_header Host $host;
    }

    # 禁止存取敏感檔案
    location ~* \.(env|map|git)$ {
        deny all;
        return 404;
    }
}
