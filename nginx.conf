server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 使用 Docker 內部 DNS，讓 upstream 在請求時才解析（避免啟動時找不到服務）
    resolver 127.0.0.11 valid=30s ipv6=off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /dify/ → api.dify.ai，API Key 由伺服器端加入，瀏覽器看不到
    location /dify/ {
        proxy_pass https://api.dify.ai/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.dify.ai;
        proxy_set_header Authorization "Bearer ${DIFY_API_KEY}";
        proxy_set_header Content-Type application/json;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin $http_origin always;
    }

    # Proxy /twse & /finmind → digirunner（用變數讓 nginx 動態解析 hostname）
    location /twse/ {
        set $digirunner digirunnner:18080;
        proxy_pass http://$digirunner/twse/;
        proxy_set_header Host $host;
    }

    location /finmind/ {
        set $digirunner digirunnner:18080;
        proxy_pass http://$digirunner/finmind/;
        proxy_set_header Host $host;
    }

    # 禁止存取敏感檔案
    location ~* \.(env|map|git)$ {
        deny all;
        return 404;
    }
}
