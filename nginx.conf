server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 使用 Docker 內部 DNS，讓 upstream 在請求時才解析（避免啟動時找不到服務）
    resolver 127.0.0.11 valid=30s ipv6=off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /dify/ → api.dify.ai，API Key 由伺服器端加入，瀏覽器看不到
    location /dify/ {
        proxy_pass https://api.dify.ai/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.dify.ai;
        proxy_set_header Authorization "Bearer ${DIFY_API_KEY}";
        proxy_set_header Content-Type application/json;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin $http_origin always;
    }

    # Proxy /twse/ → 台灣證交所（直接轉發，不經 digirunner）
    location /twse/ {
        proxy_pass https://mis.twse.com.tw/;
        proxy_ssl_server_name on;
        proxy_set_header Host mis.twse.com.tw;
        proxy_set_header Referer https://mis.twse.com.tw/;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin * always;
    }

    # Proxy /finmind/ → FinMind API（直接轉發，不經 digirunner）
    location /finmind/ {
        proxy_pass https://api.finmindtrade.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.finmindtrade.com;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin * always;
    }

    # Proxy /gnews/ → Google News RSS（解決 CORS，抓台股新聞）
    location /gnews/ {
        proxy_pass https://news.google.com/rss/search;
        proxy_ssl_server_name on;
        proxy_set_header Host news.google.com;
        proxy_set_header User-Agent "Mozilla/5.0 (compatible)";
        proxy_set_header Accept-Encoding "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin * always;
    }

    # 禁止存取敏感檔案
    location ~* \.(env|map|git)$ {
        deny all;
        return 404;
    }
}
