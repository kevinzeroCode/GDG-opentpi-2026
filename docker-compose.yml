version: '3.8'
services:
  frontend:
    build: .
    ports:
      - "80:80"
    env_file:
      - .env.server
    depends_on:
      - digirunnner
    restart: unless-stopped

  digirunnner:
    image: tpisoftwareopensource/digirunner-open-source
    ports:
      - "31080:18080"
    environment:
      - TZ=Asia/Taipei
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/opt/digirunner/data/dgrdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE;Mode=MySQL
      - SPRING_SQL_INIT_CONTINUE_ON_ERROR=true
    volumes:
      - digirunner_data:/opt/digirunner/data
      - digirunner_keys:/opt/digirunner/keys
    restart: unless-stopped

volumes:
  digirunner_data:
  digirunner_keys:
