version: '3.8'
services:
  frontend:
    build: .
    ports:
      - "80:80"
    env_file:
      - .env.server
    depends_on:
      - digirunner
    restart: unless-stopped
    networks:
      - default
      - app_default

  # nginx / certbot 僅生產環境（GCP + SSL）使用，本地開發不啟動
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
  #     - certbot_www:/var/www/certbot
  #     - certbot_conf:/etc/letsencrypt
  #   depends_on:
  #     - frontend
  #   restart: unless-stopped

  # certbot:
  #   image: certbot/certbot
  #   volumes:
  #     - certbot_www:/var/www/certbot
  #     - certbot_conf:/etc/letsencrypt

  digirunner:
    image: tpisoftwareopensource/digirunner-open-source
    ports:
      - "31080:18080"
    environment:
      - TZ=Asia/Taipei
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/opt/digirunner/data/dgrdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE;Mode=MySQL
      - SPRING_SQL_INIT_CONTINUE_ON_ERROR=true
    volumes:
      - digirunner_data:/opt/digirunner/data
      - digirunner_keys:/opt/digirunner/keys
    restart: unless-stopped

volumes:
  digirunner_data:
  digirunner_keys:
  certbot_www:
  certbot_conf:

networks:
  app_default:
    external: true
