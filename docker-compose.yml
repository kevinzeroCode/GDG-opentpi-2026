version: '3.8'
services:
  frontend:
    build: .
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - digirunner

  digirunner:
    image: tpisoftwareopensource/digirunner-open-source
    ports:
      - "31080:18080"
    environment:
      - TZ=Asia/Taipei
      # 改用 file 模式，資料永久保存在 volume
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/opt/digirunner/data/dgrdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE;Mode=MySQL
      # 忽略初始化 SQL 的重複 key 錯誤，避免重啟時 crash loop
      - SPRING_SQL_INIT_CONTINUE_ON_ERROR=true
    volumes:
      - digirunner_data:/opt/digirunner/data   # H2 資料庫檔案
      - digirunner_keys:/opt/digirunner/keys   # 加密金鑰
    restart: unless-stopped

volumes:
  digirunner_data:
  digirunner_keys: